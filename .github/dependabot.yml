version: 2

# Dependabot is paused (open-pull-requests-limit=0) during portfolio review.
# To re-enable: change `open-pull-requests-limit` back to 5 (or desired value)
# for each ecosystem. Schedule remains weekly so updates resume immediately.

updates:
  # Gradle (Java) dependencies
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - java

  # pnpm dependencies (admin-web)
  - package-ecosystem: npm
    directory: /apps/admin-web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - frontend

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - github-actions
