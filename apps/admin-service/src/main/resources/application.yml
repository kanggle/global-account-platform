spring:
  application:
    name: admin-service

  datasource:
    url: jdbc:mysql://localhost:3306/admin_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:admin_user}
    password: ${DB_PASSWORD:admin_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 1s
      connect-timeout: 1s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

outbox:
  polling:
    interval-ms: ${OUTBOX_POLLING_INTERVAL_MS:1000}
    batch-size: ${OUTBOX_POLLING_BATCH_SIZE:50}

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always
      group:
        circuitbreakers:
          include: circuitBreakers
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      service: ${spring.application.name}

admin:
  permission-cache:
    ttl-seconds: ${ADMIN_PERM_CACHE_TTL_SECONDS:10}
    key-prefix: ${ADMIN_PERM_CACHE_KEY_PREFIX:admin:operator:perm:}
  jwt:
    public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}
    expected-token-type: ${JWT_EXPECTED_TOKEN_TYPE:admin}
  downstream:
    connect-timeout-ms: ${DOWNSTREAM_CONNECT_TIMEOUT:3000}
    read-timeout-ms: ${DOWNSTREAM_READ_TIMEOUT:10000}
    internal-token: ${INTERNAL_API_TOKEN:}
  auth-service:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081}
  account-service:
    base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
  security-service:
    base-url: ${SECURITY_SERVICE_URL:http://localhost:8084}

resilience4j:
  retry:
    instances:
      accountService:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - com.example.admin.application.exception.NonRetryableDownstreamException
      authService:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - com.example.admin.application.exception.NonRetryableDownstreamException
      securityService:
        max-attempts: 2
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - com.example.admin.application.exception.NonRetryableDownstreamException
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 5s
    instances:
      accountService:
        base-config: default
        failure-rate-threshold: 50
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 5s
        sliding-window-type: TIME_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - com.example.admin.application.exception.NonRetryableDownstreamException
      authService:
        base-config: default
        failure-rate-threshold: 50
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 5s
        sliding-window-type: TIME_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - com.example.admin.application.exception.NonRetryableDownstreamException
      securityService:
        base-config: default
        failure-rate-threshold: 50
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 5s
        sliding-window-type: TIME_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - com.example.admin.application.exception.NonRetryableDownstreamException
