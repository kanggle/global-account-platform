spring:
  application:
    name: admin-service

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

outbox:
  polling:
    interval-ms: 500
    batch-size: 50

server:
  port: 0

admin:
  jwt:
    expected-scope: admin
  downstream:
    connect-timeout-ms: 2000
    read-timeout-ms: 3000
    internal-token: test-internal
  auth-service:
    base-url: http://localhost:18085
  account-service:
    base-url: http://localhost:18085
  security-service:
    base-url: http://localhost:18085

resilience4j:
  retry:
    instances:
      accountService:
        max-attempts: 3
        wait-duration: 100ms
        enable-exponential-backoff: false
        ignore-exceptions:
          - com.example.admin.application.exception.NonRetryableDownstreamException
      authService:
        max-attempts: 3
        wait-duration: 100ms
        enable-exponential-backoff: false
        ignore-exceptions:
          - com.example.admin.application.exception.NonRetryableDownstreamException
      securityService:
        max-attempts: 2
        wait-duration: 100ms
        enable-exponential-backoff: false
        ignore-exceptions:
          - com.example.admin.application.exception.NonRetryableDownstreamException
  circuitbreaker:
    instances:
      accountService:
        failure-rate-threshold: 99
        sliding-window-type: COUNT_BASED
        sliding-window-size: 100
        minimum-number-of-calls: 100
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.example.admin.application.exception.NonRetryableDownstreamException
      authService:
        failure-rate-threshold: 99
        sliding-window-type: COUNT_BASED
        sliding-window-size: 100
        minimum-number-of-calls: 100
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.example.admin.application.exception.NonRetryableDownstreamException
      securityService:
        failure-rate-threshold: 99
        sliding-window-type: COUNT_BASED
        sliding-window-size: 100
        minimum-number-of-calls: 100
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.example.admin.application.exception.NonRetryableDownstreamException
