server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: account-service
          uri: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/accounts/**
          filters:
            - StripPrefix=0

        - id: admin-service
          uri: ${ADMIN_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=0

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 100ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: true
  metrics:
    tags:
      service: ${spring.application.name}

gateway:
  jwt:
    jwks-url: ${JWKS_URL:http://localhost:8081/internal/auth/jwks}
    jwks-refresh-interval-ms: 600000
    jwks-cache-ttl-seconds: 600
    grace-period-seconds: 300

  rate-limit:
    fail-open: ${RATE_LIMIT_FAIL_OPEN:true}
    login:
      max-requests: 20
      window-seconds: 60
    signup:
      max-requests: 5
      window-seconds: 60
    refresh:
      max-requests: 10
      window-seconds: 60
    global:
      max-requests: 100
      window-seconds: 1

  public-paths:
    - POST:/api/auth/login
    - POST:/api/accounts/signup
    - POST:/api/auth/refresh
    - GET:/api/auth/oauth/authorize
    - POST:/api/auth/oauth/callback
    - GET:/actuator/health

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
