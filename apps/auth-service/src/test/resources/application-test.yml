spring:
  application:
    name: auth-service

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

outbox:
  polling:
    interval-ms: 500
    batch-size: 50

server:
  port: 0

auth:
  jwt:
    issuer: global-account-platform
    access-token-ttl-seconds: 1800
    refresh-token-ttl-seconds: 604800
    private-key-path: classpath:keys/private.pem
    public-key-path: classpath:keys/public.pem
    kid: test-key-001
  login:
    max-failure-count: 5
    failure-window-seconds: 900
  account-service:
    base-url: http://localhost:18082
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
