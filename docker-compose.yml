# =============================================================================
# Global Account Platform — Local Development Infrastructure
# =============================================================================
# Usage:
#   docker compose up -d        — start all services
#   docker compose down -v      — stop and remove volumes (clean state)
#   docker compose ps           — check service status
#
# Port Conflicts:
#   If you already have MySQL running on 3306, change MYSQL_PORT in .env
#   If you already have Redis running on 6379, change REDIS_PORT in .env
#   If you already have Kafka running on 9092/9093, change KAFKA_*_PORT in .env
#   If you already have a service on 8090, change KAFKA_UI_PORT in .env
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MySQL 8 — 4 databases: auth_db, account_db, security_db, admin_db
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: gap-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:-auth_pass}
      ACCOUNT_DB_PASSWORD: ${ACCOUNT_DB_PASSWORD:-account_pass}
      SECURITY_DB_PASSWORD: ${SECURITY_DB_PASSWORD:-security_pass}
      ADMIN_DB_PASSWORD: ${ADMIN_DB_PASSWORD:-admin_pass}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gap-network

  # ---------------------------------------------------------------------------
  # Redis 7 Alpine — single instance with password
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: gap-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gap-network

  # ---------------------------------------------------------------------------
  # Kafka (KRaft mode — no Zookeeper dependency)
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: gap-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9093}:9093"
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qg}
      # Listeners
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9093}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Log retention — 1 day for local dev (Edge Case: disk space)
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      # Defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - gap-network

  # ---------------------------------------------------------------------------
  # Kafka Topic Initializer — creates 14 main + 14 DLQ topics idempotently
  # ---------------------------------------------------------------------------
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: gap-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "=== Waiting for Kafka broker ==="
        # Extra wait to ensure broker is fully ready for topic creation
        sleep 5

        KAFKA_BIN="/opt/kafka/bin"
        BOOTSTRAP="kafka:9092"

        MAIN_PARTITIONS=3
        DLQ_PARTITIONS=1
        REPLICATION_FACTOR=1
        MAIN_RETENTION_MS=604800000
        DLQ_RETENTION_MS=2592000000

        TOPICS=(
          "auth.login.attempted"
          "auth.login.failed"
          "auth.login.succeeded"
          "auth.token.refreshed"
          "auth.token.reuse.detected"
          "account.created"
          "account.status.changed"
          "account.locked"
          "account.unlocked"
          "account.deleted"
          "session.revoked"
          "security.suspicious.detected"
          "security.auto.lock.triggered"
          "admin.action.performed"
        )

        create_topic() {
          local topic="$$1" partitions="$$2" retention="$$3"
          $$KAFKA_BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP \
            --create --if-not-exists \
            --topic "$$topic" \
            --partitions "$$partitions" \
            --replication-factor $$REPLICATION_FACTOR \
            --config retention.ms="$$retention" \
            --config cleanup.policy=delete \
            && echo "Created: $$topic" \
            || echo "Skipped: $$topic (already exists)"
        }

        echo "=== Creating main topics ==="
        for t in "$${TOPICS[@]}"; do
          create_topic "$$t" $$MAIN_PARTITIONS $$MAIN_RETENTION_MS
        done

        echo "=== Creating DLQ topics ==="
        for t in "$${TOPICS[@]}"; do
          create_topic "$$t.dlq" $$DLQ_PARTITIONS $$DLQ_RETENTION_MS
        done

        echo "=== Topic creation complete ==="
        $$KAFKA_BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --list | sort
        echo "Done."
    restart: "no"
    networks:
      - gap-network

  # ---------------------------------------------------------------------------
  # Kafka UI (provectuslabs/kafka-ui)
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: gap-kafka-ui
    restart: unless-stopped
    ports:
      - "${KAFKA_UI_PORT:-8090}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: gap-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gap-network

volumes:
  mysql-data:
  redis-data:
  kafka-data:

networks:
  gap-network:
    driver: bridge
